schema_version: 1

# Metadata - Descibes the target
meta:
  name: "Pokemon Platinum"
  version: 1
  platform: "NDS"
  emulator: "melonDS"
  process: "melonds"
  region: "USA"

# Groups - organize offsets into logical sections
groups:

